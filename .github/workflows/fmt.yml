name: Format
on:
  pull_request:
    paths:
      - '.github/workflows/fmt.yml'
      - 'src/**/*'
      - 'tests/**/*'
      - 'Cargo.toml'
  push:
    branches: [master]

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt

      - name: Run fmt
        run: cargo +nightly fmt --all -- --check --unstable-features
